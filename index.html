<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Origin MMA – Coming Soon</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f1ec;

      background-image:url("background.png");
     /* background-repeat: repeat;*/
      background-size: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #222;
    }

    .overlay {
      /*background: rgba(244, 241, 236, 0.9);*/
      padding: 60px 30px;
      max-width: 500px;
      width: 100%;
      border-radius: 12px;    
      display: flex;
      justify-content: center; /* horizontal */
      align-items: center;     /* vertical */

    }

    .logo {
      width: 140px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      margin: 10px 0;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 30px;
      font-weight: normal;
    }

    .signup {
      display: flex;
      margin-top: 20px;
    }

    .signup input {
      flex: 1;
      padding: 14px;
      border-radius: 8px 0 0 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
    }

    .signup button {
      padding: 14px 22px;
      border-radius: 0 8px 8px 0;
      border: none;
      font-size: 16px;
      cursor: pointer;
      background: #6b3fa0; /* purple accent */
      color: white;
      transition: background 0.3s ease;
    }

    .signup button:hover {
      background: #5a3486;
    }

    .small-text {
      font-size: 13px;
      margin-top: 12px;
      opacity: 0.7;
    }

.logo {
  width: 420px;
  margin-bottom: 20px;
}

  </style>
</head>

<body>

  <div class="overlay">
    <!-- Replace src with your transparent logo -->
    <img src="logo.png" alt="Origin MMA Logo" class="logo"/>

    <h2>COMING IN 2027</h2>

    <p>Sign up to get updates and opening dates</p>

    <form class="signup">
      <input type="email" placeholder="Enter your email" required />
      <button type="submit">Notify Me</button>
    </form>

    <div class="small-text">
      We’ll never spam you. Unsubscribe anytime.
    </div>
  </div>

</body>

</html>
